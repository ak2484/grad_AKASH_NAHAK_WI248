<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WiT BANK</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      /* Layout Fixes for One-Screen View */
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .bg-gradient-custom {
        background: linear-gradient(
          135deg,
          #0f2027,
          #203a43,
          #2c5364
        ) !important;
      }

      .sidebar-link {
        transition:
          background 0.2s,
          padding-left 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
      }

      .sidebar-link:hover {
        background-color: rgba(37, 99, 235, 0.8) !important;
        color: white;
        padding-left: 20px;
      }

      /* Desktop Sidebar Behavior (Breakpoint: SM 576px) */
      @media (min-width: 576px) {
        .offcanvas-sm {
          position: static !important;
          visibility: visible !important;
          transform: none !important;
          flex-shrink: 0;
          display: flex !important;
          border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Hide the hamburger button on screens larger than SM */
        .navbar-toggler {
          display: none !important;
        }
      }

      /* Centering the Brand specifically */
      .navbar-brand-centered {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: nowrap;
      }

      /* Custom Scrollbar for the content area */
      #content::-webkit-scrollbar {
        width: 6px;
      }
      #content::-webkit-scrollbar-thumb {
        background-color: #cbd5e0;
        border-radius: 10px;
      }
    </style>
  </head>

  <body class="vh-100 d-flex flex-column bg-light overflow-hidden">
    <nav
      class="navbar navbar-dark bg-gradient-custom shadow-sm flex-shrink-0 position-relative py-3"
    >
      <div class="container-fluid">
        <button
          class="navbar-toggler d-sm-none"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#sidebarMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="navbar-brand-centered">
          <a
            class="text-white text-decoration-none d-flex flex-column align-items-center"
            href="#"
          >
            <h1 class="h4 mb-0 fw-bold">WiT BANK</h1>
            <small style="font-size: 0.7rem; letter-spacing: 1px; opacity: 0.8"
              >Banking at your Doorstep</small
            >
          </a>
        </div>

        <div class="ms-auto d-none d-sm-block">
          <i
            class="bi bi-person-circle text-white fs-4"
            style="opacity: 0.7"
          ></i>
        </div>
      </div>
    </nav>

    <div class="d-flex flex-grow-1 overflow-hidden">
      <div
        class="offcanvas-sm offcanvas-start bg-gradient-custom text-white border-0"
        tabindex="-1"
        id="sidebarMenu"
        style="width: 250px"
      >
        <div class="offcanvas-header d-sm-none">
          <h5 class="offcanvas-title fw-light">Navigation</h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="offcanvas"
            data-bs-target="#sidebarMenu"
          ></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-3">
          <nav class="nav flex-column flex-grow-1">
            <a
              onclick="displayHome()"
              class="sidebar-link p-3 mb-2 rounded"
              data-bs-dismiss="offcanvas"
              data-bs-target="#sidebarMenu"
            >
              <i class="bi bi-house-door me-3"></i>HOME
            </a>
            <a
              onclick="displayAbout()"
              class="sidebar-link p-3 mb-2 rounded"
              data-bs-dismiss="offcanvas"
              data-bs-target="#sidebarMenu"
            >
              <i class="bi bi-info-circle me-3"></i>ABOUT US
            </a>
            <a
              onclick="displayServices()"
              class="sidebar-link p-3 mb-2 rounded"
              data-bs-dismiss="offcanvas"
              data-bs-target="#sidebarMenu"
            >
              <i class="bi bi-gear me-3"></i>SERVICES
            </a>
            <a
              onclick="displayNetBanking()"
              class="sidebar-link p-3 mb-2 rounded"
              data-bs-dismiss="offcanvas"
              data-bs-target="#sidebarMenu"
            >
              <i class="bi bi-laptop me-3"></i>NETBANKING
            </a>
            <a
              onclick="displayContact()"
              class="sidebar-link p-3 rounded"
              data-bs-dismiss="offcanvas"
              data-bs-target="#sidebarMenu"
            >
              <i class="bi bi-envelope me-3"></i>CONTACT US
            </a>
          </nav>
        </div>
      </div>

      <main id="content" class="flex-grow-1 p-4 p-md-5 bg-white overflow-auto">
        <div class="text-center mt-5">
          <h3 class="border-bottom pb-3 d-inline-block fw-bold">
            Welcome to WiT BANK
          </h3>
          <p class="text-muted mt-3 lead">
            Select an option from the sidebar to manage your accounts and
            services.
          </p>
          <div class="mt-4">
            <i class="bi bi-bank text-secondary" style="font-size: 4rem"></i>
          </div>
        </div>
      </main>
    </div>

    <footer
      class="bg-gradient-custom text-center py-2 text-white-50 border-top flex-shrink-0"
    >
      <h6 class="mb-0 small fw-light">www.witbank.com</h6>
      <small style="font-size: 0.65rem"
        >@Copyright 2026. All rights reserved.</small
      >
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
