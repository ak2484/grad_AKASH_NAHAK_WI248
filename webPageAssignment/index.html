<!doctype html>
<html>
  <head>
    <title>WiT BANK</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f4f6f9;
      }

      /* HEADER */
      header {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
        padding: 15px;
      }

      /* MAIN LAYOUT */
      .container {
        display: flex;
        min-height: 500px;
      }

      /* SIDEBAR */
      .sidebar {
        width: 20%;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        padding: 25px 15px;
      }

      .sidebar a {
        display: block;
        color: #e5e7eb;
        text-decoration: none;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        transition: 0.3s;
        font-weight: 500;
      }

      .sidebar a:hover {
        background-color: #2563eb;
        color: white;
      }

      /* CONTENT */
      .content {
        width: 80%;
        padding: 40px;
        background-color: white;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
      }

      /* FOOTER */
      footer {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #d1d5db;
        text-align: center;
        padding: 15px;
        font-size: 14px;
      }

      /* BUTTONS */
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        background-color: #2563eb;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background-color: #1e40af;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>WiT BANK</h1>
      <h4>Banking at your Doorstep</h4>
    </header>

    <div class="container">
      <div class="sidebar">
        <a onclick="displayHome()">HOME</a>
        <a onclick="displayAbout()">ABOUT US</a>
        <a onclick="displayServices()">SERVICES</a>
        <a onclick="displayNetBanking()">NETBANKING</a>
        <a onclick="displayContact()">CONTACT US</a>
      </div>

      <div class="content" id="content">
        <h3>Welcome to Our Bank</h3>
      </div>
    </div>

    <footer>
      <h3>www.witbank.com</h3>
      <p>@Copyright. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
